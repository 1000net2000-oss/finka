<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F6F4EF">
<title>Учёт</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- ГЛАВНЫЙ ЭКРАН -->
  <div class="view active" id="view-home">

    <div class="header">
      <div class="eyebrow" id="homeEyebrow">Затрачено · —</div>
      <div class="balance-row">
        <span class="balance" id="homeTotal">0</span>
        <span class="balance-currency">PLN</span>
      </div>
    </div>

    <div class="entry-zone">
      <div class="entry-label">Записать</div>
      <input class="entry-field" id="entryInput" type="text" placeholder="кофе 15" autocomplete="off" inputmode="text">

      <div class="stamp-row">
        <div class="stamp" id="stamp">
          <span class="stamp-icon" id="stampIcon">❔</span>
          <span id="stampText">Прочее</span>
        </div>
        <label class="date-pill">
          <span class="date-icon">📅</span>
          <span id="dateText">Сегодня</span>
          <input type="date" id="dateInput" class="date-input">
        </label>
      </div>

      <button class="record-btn" id="recordBtn">Записать</button>
    </div>

    <div class="chips" id="quickChips"></div>

    <div class="recent">
      <div class="recent-title">Сегодня</div>
      <div id="recentList"></div>
    </div>

  </div>

  <!-- СТАТИСТИКА -->
  <div class="view" id="view-stats">

    <div class="screen-header">
      <div class="screen-title">Статистика</div>
    </div>

    <div class="period-tabs" id="statsPeriodTabs">
      <div class="period-tab" data-period="week">Неделя</div>
      <div class="period-tab active" data-period="month">Месяц</div>
      <div class="period-tab" data-period="year">Год</div>
    </div>

    <div class="donut-wrap">
      <div class="donut" id="statsDonut">
        <div class="donut-center">
          <div class="donut-total" id="statsTotal">0 zł</div>
          <div class="donut-label">потрачено</div>
        </div>
      </div>
    </div>

    <div class="cat-list" id="statsCatList"></div>

    <div class="trend-wrap">
      <div class="recent-title">По неделям</div>
      <div class="trend-bars" id="trendBars"></div>
      <div class="trend-days" id="trendDays"></div>
    </div>

  </div>

  <!-- ДЕТАЛИ КАТЕГОРИИ -->
  <div class="view" id="view-category">

    <div class="screen-header cat-detail-header">
      <span class="back-btn" id="backFromCat">‹</span>
      <div class="cat-detail-title">
        <span id="catDetailIcon">🛒</span>
        <span id="catDetailName">Категория</span>
      </div>
    </div>

    <div class="donut-wrap">
      <div class="cat-total-circle" id="catTotalCircle">
        <div class="donut-total" id="catDetailAmount">0 zł</div>
        <div class="donut-label" id="catDetailPeriod">за месяц</div>
      </div>
    </div>

    <div class="recent" style="margin-top:18px;">
      <div class="recent-title">Записи</div>
      <div id="catDetailList"></div>
    </div>

  </div>

  <!-- ИСТОРИЯ -->
  <div class="view" id="view-history">

    <div class="screen-header">
      <div class="screen-title">История</div>
    </div>

    <div class="filter-row" id="historyFilters"></div>

    <div id="historyList"></div>

  </div>

  <!-- НАВБАР -->
  <div class="navbar">
    <div class="nav-item active" data-view="view-home">
      <span class="nav-icon">⌂</span>
      <span>Главная</span>
      <span class="nav-dot"></span>
    </div>
    <div class="nav-item" data-view="view-stats">
      <span class="nav-icon">◈</span>
      <span>Статистика</span>
      <span class="nav-dot"></span>
    </div>
    <div class="nav-item" data-view="view-history">
      <span class="nav-icon">▤</span>
      <span>История</span>
      <span class="nav-dot"></span>
    </div>
  </div>

</div>

<div class="toast" id="toast">
  <span id="toastText">Записано</span>
  <span class="toast-undo" id="toastUndo">Отменить</span>
</div>

<script src="categories.js"></script>
<script src="storage.js"></script>
<script src="app.js"></script>
</body>
</html>
